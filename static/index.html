<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MIIP — Document Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f5f4f1;
    --panel: #ffffff;
    --ink: #1c1b1a;
    --muted: #76726c;
    --line: #e4e1db;
    --accent: #c2410c;        /* burnt amber, used sparingly */
    --accent-soft: #fdf0e8;
    --user-bubble: #1c1b1a;
    --bot-bubble: #ffffff;
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
  }

  .app {
    max-width: 760px;
    margin: 0 auto;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 0 16px;
  }

  /* ---- header ---- */
  header {
    padding: 22px 4px 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .wordmark {
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    letter-spacing: -0.5px;
    font-size: 17px;
  }
  .wordmark span { color: var(--accent); }
  .modes { display: flex; gap: 6px; }
  .mode-pill {
    font: inherit;
    font-size: 12.5px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--muted);
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
  }
  .mode-pill:hover { border-color: #cfccc5; }
  .mode-pill[aria-pressed="true"] {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .mode-pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---- messages ---- */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 2px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }

  .bubble {
    max-width: 82%;
    padding: 11px 15px;
    border-radius: var(--radius);
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .row.user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .row.bot .bubble {
    background: var(--bot-bubble);
    color: var(--ink);
    border: 1px solid var(--line);
    border-bottom-left-radius: 4px;
  }

  .sources {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .chip {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 6px;
    background: var(--accent-soft);
    color: var(--accent);
  }

  .empty {
    margin: auto;
    text-align: center;
    color: var(--muted);
    max-width: 380px;
  }
  .empty .wordmark { font-size: 22px; display: block; margin-bottom: 10px; }

  /* typing dots */
  .dots { display: inline-flex; gap: 4px; padding: 4px 2px; }
  .dots i {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); opacity: .4;
    animation: blink 1.2s infinite;
  }
  .dots i:nth-child(2) { animation-delay: .2s; }
  .dots i:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.3;transform:translateY(0)} 40%{opacity:1;transform:translateY(-2px)} }

  /* ---- composer ---- */
  .composer {
    border-top: 1px solid var(--line);
    padding: 14px 0 18px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    resize: none;
    font: inherit;
    padding: 11px 14px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--panel);
    color: var(--ink);
    max-height: 140px;
  }
  textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
  .send {
    font: inherit;
    font-weight: 600;
    padding: 11px 20px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fff;
    cursor: pointer;
  }
  .send:hover { background: #a83609; }
  .send:disabled { opacity: .45; cursor: default; }
  .send:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  @media (prefers-reduced-motion: reduce) {
    .dots i { animation: none; }
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="wordmark">miip<span>.</span>chat</div>
    <div class="modes" id="modes">
      <button class="mode-pill" data-mode="normal" aria-pressed="true">Normal</button>
      <button class="mode-pill" data-mode="chroma" aria-pressed="false">Doc · Chroma</button>
      <button class="mode-pill" data-mode="faiss" aria-pressed="false">Doc · FAISS</button>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="empty" id="empty">
      <span class="wordmark">miip<span>.</span>chat</span>
      Ask anything in <strong>Normal</strong> mode, or switch to a document mode to
      query your indexed PDF with reranking.
    </div>
  </div>

  <div class="composer">
    <textarea id="input" rows="1" placeholder="Type a message…" autofocus></textarea>
    <button class="send" id="send">Send</button>
  </div>
</div>

<script>
  // same origin when served by FastAPI; change if you host the UI separately
  const API_BASE = "";

  let mode = "normal";
  const messagesEl = document.getElementById("messages");
  const emptyEl = document.getElementById("empty");
  const inputEl = document.getElementById("input");
  const sendEl = document.getElementById("send");
  const modesEl = document.getElementById("modes");

  // mode switching
  modesEl.addEventListener("click", (e) => {
    const btn = e.target.closest(".mode-pill");
    if (!btn) return;
    mode = btn.dataset.mode;
    [...modesEl.children].forEach(b =>
      b.setAttribute("aria-pressed", String(b === btn))
    );
    inputEl.focus();
  });

  // auto-grow textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = inputEl.scrollHeight + "px";
  });

  // Enter to send, Shift+Enter for newline
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendEl.addEventListener("click", sendMessage);

  function addBubble(role, text, pages) {
    if (emptyEl) emptyEl.remove();
    const row = document.createElement("div");
    row.className = "row " + role;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    if (pages && pages.length) {
      const src = document.createElement("div");
      src.className = "sources";
      pages.forEach(p => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = "p. " + p;
        src.appendChild(chip);
      });
      bubble.appendChild(src);
    }
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function addTyping() {
    if (emptyEl && emptyEl.parentNode) emptyEl.remove();
    const row = document.createElement("div");
    row.className = "row bot";
    row.innerHTML = '<div class="bubble"><div class="dots"><i></i><i></i><i></i></div></div>';
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    addBubble("user", text);
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendEl.disabled = true;

    const typing = addTyping();

    try {
      const res = await fetch(API_BASE + "/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, mode }),
      });
      typing.remove();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addBubble("bot", "Error: " + (err.detail || res.statusText));
      } else {
        const data = await res.json();
        addBubble("bot", data.answer, data.pages);
      }
    } catch (e) {
      typing.remove();
      addBubble("bot", "Could not reach the server. Is uvicorn running?");
    } finally {
      sendEl.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
