<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MIIP — Document Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="app">
  <header>
    <div class="wordmark">miip<span>.</span>chat</div>
    <div class="modes" id="modes">
      <button class="mode-pill" data-mode="normal" aria-pressed="true">Normal</button>
      <button class="mode-pill" data-mode="chroma" aria-pressed="false">Doc · Chroma</button>
      <button class="mode-pill" data-mode="faiss" aria-pressed="false">Doc · FAISS</button>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="empty" id="empty">
      <span class="wordmark">miip<span>.</span>chat</span>
      Ask anything in <strong>Normal</strong> mode, or switch to a document mode to
      query your indexed PDF with reranking.
    </div>
  </div>

  <div class="composer">
    <textarea id="input" rows="1" placeholder="Type a message…" autofocus></textarea>
    <button class="send" id="send">Send</button>
  </div>
</div>

<script src="/static/App.js"></script>
</body>
</html>
